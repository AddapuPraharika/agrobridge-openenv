name: AgroBridgeEnv
version: 1.0
description: AI environment for matching farmers with agricultural jobs in rural India

environment:
  observation_space:
    job: string
    required_skill: string
    difficulty: string
    farmers: list

  action_space:
    message: string

  reward_range:
    min: 0.05
    max: 0.95

tasks:
  - name: easy
    description: Match farmer skill exactly with job requirement
    grader: grade_easy

  - name: medium
    description: Partial skill match with contextual reward
    grader: grade_medium

  - name: hard
    description: Complex multi-skill farmer-job matching under difficulty
    grader: grade_hard
